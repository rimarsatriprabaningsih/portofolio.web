<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Vestia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="promo-strip">✦ Gratis ongkir untuk pembelian di atas Rp 500.000 ✦</div>

  <header>
    <a href="index.html" class="logo">VESTIA</a>
    <nav>
      <a href="index.html">Beranda</a>
      <a href="products.html">Koleksi</a>
      <a href="cart.html" class="cart-link">
        Keranjang <span class="cart-badge" id="cart-count">0</span>
      </a>
    </nav>
  </header>

  <div class="page-hero">
    <h1>Checkout</h1>
    <p>Lengkapi data pengiriman untuk menyelesaikan pesanan</p>
  </div>

  <section class="section">
    <div id="checkout-content"></div>
  </section>

  <footer>
    <div class="footer-logo">VESTIA</div>
    <p>© 2026 Vestia.</p>
  </footer>

  <script src="app.js"></script>
  <script>
    const container = document.getElementById("checkout-content");
    const cart = getCart();

    if (cart.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="emoji">📦</div>
          <h3>Tidak ada pesanan</h3>
          <p>Tambahkan produk ke keranjang terlebih dahulu</p>
          <a href="products.html" class="btn btn-primary">Belanja Sekarang</a>
        </div>`;
    } else {
      const subtotal = getCartTotal();
      const shipping = subtotal >= 500000 ? 0 : 25000;
      const grandTotal = subtotal + shipping;

      const itemsHtml = cart.map(i => `
        <div class="line">
          <span>${i.name} × ${i.qty}</span>
          <span>${formatRupiah(i.price * i.qty)}</span>
        </div>
      `).join("");

      container.innerHTML = `
        <div class="checkout-layout">
          <div class="checkout-box">
            <h3>Data Pengiriman</h3>
            <form id="checkout-form">
              <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" required placeholder="Masukkan nama lengkap">
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" required placeholder="nama@email.com">
              </div>
              <div class="form-group">
                <label>No. Telepon</label>
                <input type="tel" required placeholder="08xxxxxxxxxx">
              </div>
              <div class="form-group">
                <label>Alamat Pengiriman</label>
                <textarea required placeholder="Jl. ..., Kota, Provinsi, Kode Pos"></textarea>
              </div>
              <div class="form-group">
                <label>Metode Pembayaran</label>
                <select required>
                  <option value="">— Pilih metode —</option>
                  <option>Transfer Bank (BCA / Mandiri)</option>
                  <option>E-Wallet (GoPay / OVO / Dana)</option>
                  <option>COD (Bayar di Tempat)</option>
                </select>
              </div>
              <button type="submit" class="btn btn-dark" style="padding:1rem;font-size:0.9rem">
                Konfirmasi Pesanan
              </button>
            </form>
          </div>

          <div class="order-sidebar">
            <h4>Ringkasan Pesanan</h4>
            ${itemsHtml}
            <div class="line" style="margin-top:1rem">
              <span>Subtotal</span>
              <span>${formatRupiah(subtotal)}</span>
            </div>
            <div class="line">
              <span>Ongkir</span>
              <span>${shipping === 0 ? "Gratis" : formatRupiah(shipping)}</span>
            </div>
            <div class="grand-total">
              <span>Total</span>
              <span>${formatRupiah(grandTotal)}</span>
            </div>
          </div>
        </div>`;

      document.getElementById("checkout-form").addEventListener("submit", function(e) {
        e.preventDefault();
        localStorage.removeItem("vestia_cart");
        updateCartBadge();
        container.innerHTML = `
          <div class="success-box">
            <div class="check">✓</div>
            <h2>Pesanan Berhasil!</h2>
            <p>Terima kasih telah berbelanja di Vestia.</p>
            <p style="margin-top:0.5rem">Konfirmasi pesanan akan dikirim ke email kamu.</p>
            <a href="index.html" class="btn btn-primary" style="margin-top:2rem;display:inline-block">
              Kembali ke Beranda
            </a>
          </div>`;
      });
    }
  </script>
</body>
</html>
